# Render Blueprint — infrastructure-as-code for the voice agent.
# Render auto-detects this file on repo connect and creates the service.
# Secrets (sync: false) must be set in the Render dashboard manually.

services:
  - type: web
    name: voice-ai-receptionist
    runtime: docker
    dockerfilePath: apps/voice-agent/Dockerfile
    dockerContext: apps/voice-agent
    plan: free
    healthCheckPath: /healthz
    envVars:
      # --- Non-secret config ---
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: INFO
      - key: BUSINESS_SLUG
        value: acme-plumbing
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # --- Secrets (set in Render dashboard) ---
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
